<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>每日全球要闻</title>
  <meta name="description" content="每天 5 条最关键的全球新闻" />

  <!-- PWA 配置 -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <!-- iPhone “添加到主屏幕”支持 -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="全球要闻" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />

  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --accent: #38bdf8;
      --border: #334155;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      font-family: -apple-system, "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      line-height: 1.6;
    }
    header {
      padding: 22px 18px 14px;
      position: sticky; top: 0;
      background: linear-gradient(var(--bg), rgba(15,23,42,.92));
      backdrop-filter: blur(8px);
      z-index: 10;
      border-bottom: 1px solid var(--border);
    }
    h1 { margin: 0; font-size: 22px; letter-spacing: 1px; }
    .subline { display: flex; justify-content: space-between; align-items: center; margin-top: 6px; }
    .date { color: var(--muted); font-size: 13px; }
    #refresh {
      background: none; border: 1px solid var(--border); color: var(--accent);
      border-radius: 999px; padding: 5px 14px; font-size: 13px; cursor: pointer;
    }
    #refresh:active { transform: scale(.96); }
    main { padding: 14px 16px 40px; max-width: 680px; margin: 0 auto; }
    .card {
      display: block; text-decoration: none; color: inherit;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 16px; padding: 16px; margin-bottom: 14px;
      transition: transform .12s ease;
    }
    .card:active { transform: scale(.985); }
    .meta { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .num {
      flex: none; width: 26px; height: 26px; border-radius: 8px;
      background: var(--accent); color: #062536; font-weight: 700;
      display: grid; place-items: center; font-size: 14px;
    }
    .source { font-size: 12px; color: var(--accent); font-weight: 600; }
    .lang-tag {
      font-size: 10px; color: var(--muted); border: 1px solid var(--border);
      border-radius: 4px; padding: 1px 5px;
    }
    .time { font-size: 12px; color: var(--muted); margin-left: auto; }
    .title { font-size: 16.5px; font-weight: 600; margin: 0 0 6px; }
    .snippet { font-size: 14px; color: var(--muted); margin: 0; }
    .state { text-align: center; color: var(--muted); padding: 60px 20px; }
    .spinner {
      width: 28px; height: 28px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      margin: 0 auto 14px; animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { text-align: center; color: var(--muted); font-size: 12px; padding: 0 20px 30px; }
  </style>
</head>
<body>
  <header>
    <h1>🌍 每日全球要闻</h1>
    <div class="subline">
      <span class="date" id="date">加载中…</span>
      <button id="refresh">刷新</button>
    </div>
  </header>

  <main id="list">
    <div class="state"><div class="spinner"></div>正在获取今日要闻…</div>
  </main>

  <footer>每天精选 5 条 · 数据来源 BBC / The Guardian</footer>

  <script>
    const list = document.getElementById('list');
    const dateEl = document.getElementById('date');

    function fmtTime(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function render(data) {
      dateEl.textContent = '更新于 ' + fmtTime(data.updatedAt);
      if (!data.items || !data.items.length) {
        list.innerHTML = '<div class="state">暂时没有获取到新闻，请稍后刷新。</div>';
        return;
      }
      list.innerHTML = data.items.map((n, i) => `
        <a class="card" href="${n.link}" target="_blank" rel="noopener">
          <div class="meta">
            <span class="num">${i + 1}</span>
            <span class="source">${n.source}</span>
            <span class="lang-tag">${n.lang === 'zh' ? '中文' : 'EN'}</span>
            <span class="time">${fmtTime(n.isoDate)}</span>
          </div>
          <p class="title">${n.title}</p>
          ${n.snippet ? `<p class="snippet">${n.snippet}</p>` : ''}
        </a>
      `).join('');
    }

    async function load() {
      list.innerHTML = '<div class="state"><div class="spinner"></div>正在获取今日要闻…</div>';
      try {
        const res = await fetch('/api/news', { cache: 'no-store' });
        if (!res.ok) throw new Error('接口错误');
        render(await res.json());
      } catch (e) {
        list.innerHTML = '<div class="state">😕 加载失败，请检查网络后点“刷新”重试。</div>';
      }
    }

    document.getElementById('refresh').addEventListener('click', load);
    load();

    // 注册 Service Worker（PWA 离线支持）
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
    }
  </script>
</body>
</html>
