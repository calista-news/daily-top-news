<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>每日全球要闻</title>
  <meta name="description" content="每天 5 条最关键的全球新闻" />

  <!-- PWA 配置 -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="全球要闻" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />

  <style>
    :root {
      --bg: #ffffff;
      --ink: #111111;
      --muted: #888888;
      --line: #e6e6e6;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      line-height: 1.6;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
      -webkit-font-smoothing: antialiased;
    }

    /* ── 极简报头 ── */
    header {
      max-width: 640px; margin: 0 auto;
      padding: 40px 22px 20px;
    }
    .kicker {
      font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
      color: var(--muted); margin-bottom: 10px;
    }
    h1 {
      margin: 0; font-size: 30px; font-weight: 800; letter-spacing: -0.5px;
    }
    .masthead-foot {
      display: flex; justify-content: space-between; align-items: baseline;
      margin-top: 14px; padding-top: 14px; border-top: 2px solid var(--ink);
      font-size: 12.5px; color: var(--muted);
    }
    #refresh {
      background: none; border: none; color: var(--ink); cursor: pointer;
      font-family: inherit; font-size: 12.5px; padding: 0;
      border-bottom: 1px solid var(--ink);
    }
    #refresh:active { opacity: .5; }

    main { max-width: 640px; margin: 0 auto; padding: 0 22px 48px; }

    /* ── 新闻条目 ── */
    .card {
      display: block; text-decoration: none; color: inherit;
      padding: 24px 0; border-bottom: 1px solid var(--line);
    }
    .card:last-child { border-bottom: none; }
    .card:active { opacity: .55; }
    .meta {
      display: flex; align-items: center; gap: 10px; margin-bottom: 10px;
      font-size: 11px; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
    }
    .cat { color: var(--ink); font-weight: 700; }
    .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }
    .time { margin-left: auto; letter-spacing: .5px; text-transform: none; }
    .title {
      font-size: 20px; font-weight: 700; line-height: 1.35; margin: 0 0 8px;
      letter-spacing: -0.2px;
    }
    .snippet {
      font-size: 14.5px; color: #555; margin: 0; line-height: 1.55;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
    }
    .lead .title { font-size: 26px; line-height: 1.28; }

    .state { text-align: center; color: var(--muted); padding: 80px 20px; font-size: 14.5px; }
    .spinner {
      width: 24px; height: 24px; border: 2px solid var(--line);
      border-top-color: var(--ink); border-radius: 50%;
      margin: 0 auto 16px; animation: spin .9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer {
      max-width: 640px; margin: 0 auto; text-align: center;
      color: var(--muted); font-size: 11px; letter-spacing: .5px;
      padding: 24px 22px 40px; border-top: 1px solid var(--line);
    }
  </style>
</head>
<body>
  <header>
    <div class="kicker">Daily Global Briefing</div>
    <h1>每日全球要闻</h1>
    <div class="masthead-foot">
      <span id="date">加载中…</span>
      <button id="refresh">刷新</button>
    </div>
  </header>

  <main id="list">
    <div class="state"><div class="spinner"></div>正在获取今日要闻…</div>
  </main>

  <footer>每日精选 5 条 · 国际 / 财经 / 科技 · BBC · The Guardian</footer>

  <script>
    const list = document.getElementById('list');
    const dateEl = document.getElementById('date');
    const CAT_LABEL = { politics: '国际', business: '财经', tech: '科技' };

    function fmtDate(iso) {
      const d = iso ? new Date(iso) : new Date();
      return d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }
    function fmtTime(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleString('zh-CN', { month: 'numeric', day: 'numeric', hour: '2-digit', minute: '2-digit' });
    }

    function render(data) {
      dateEl.textContent = fmtDate(data.updatedAt);
      if (!data.items || !data.items.length) {
        list.innerHTML = '<div class="state">暂时没有获取到新闻，请稍后点“刷新”。</div>';
        return;
      }
      list.innerHTML = data.items.map((n, i) => `
        <a class="card ${i === 0 ? 'lead' : ''}" href="${n.link}" target="_blank" rel="noopener">
          <div class="meta">
            <span class="cat">${CAT_LABEL[n.category] || '要闻'}</span>
            <span class="dot"></span>
            <span>${n.source}</span>
            <span class="time">${fmtTime(n.isoDate)}</span>
          </div>
          <h2 class="title">${n.title}</h2>
          ${n.snippet ? `<p class="snippet">${n.snippet}</p>` : ''}
        </a>
      `).join('');
    }

    async function load() {
      list.innerHTML = '<div class="state"><div class="spinner"></div>正在获取今日要闻…</div>';
      try {
        const res = await fetch('/api/news', { cache: 'no-store' });
        if (!res.ok) throw new Error('接口错误');
        render(await res.json());
      } catch (e) {
        list.innerHTML = '<div class="state">😕 加载失败，请检查网络后点“刷新”重试。</div>';
      }
    }

    document.getElementById('refresh').addEventListener('click', load);
    load();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
    }
  </script>
</body>
</html>
