<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>每日全球要闻</title>
  <meta name="description" content="每天 5 条最关键的全球新闻" />

  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#ffffff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="全球要闻" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />

  <style>
    /* 自托管 Lora 可变字体（优雅衬线，用于英文标题） */
    @font-face {
      font-family: 'Lora';
      src: url('/fonts/Lora.ttf') format('truetype');
      font-weight: 400 700;
      font-style: normal;
      font-display: swap;
    }
    :root {
      --bg: #ffffff;
      --ink: #0e0e10;
      --muted: #9aa0a6;
      --serif: 'Lora', Georgia, "Times New Roman", "Songti SC", serif;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0; background: var(--bg); color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      line-height: 1.5; -webkit-font-smoothing: antialiased;
      padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    }

    header {
      max-width: 560px; margin: 0 auto; padding: 26px 20px 12px;
      display: flex; align-items: flex-end; justify-content: space-between;
    }
    .h-title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin: 0; }
    .h-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    #refresh {
      background: #f1f3f4; border: none; color: var(--ink); cursor: pointer;
      font-family: inherit; font-size: 13px; padding: 8px 14px; border-radius: 999px;
    }
    #refresh:active { transform: scale(.95); }

    main { max-width: 560px; margin: 0 auto; padding: 8px 16px 40px; }

    /* ── 大图卡片 ── */
    .card {
      display: block; text-decoration: none; color: #fff;
      position: relative; border-radius: 22px; overflow: hidden;
      min-height: 420px; margin-bottom: 18px;
      background: linear-gradient(135deg, #3a3f47, #15171b);
      box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }
    .card:active { transform: scale(.99); }
    .card .photo {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .card .shade {
      position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.88) 0%, rgba(0,0,0,.45) 38%, rgba(0,0,0,0) 66%);
    }
    .cat {
      position: absolute; top: 16px; left: 16px;
      font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
      color: #fff; background: rgba(255,255,255,.22); backdrop-filter: blur(8px);
      padding: 6px 12px; border-radius: 999px;
    }
    .content { position: absolute; left: 0; right: 0; bottom: 0; padding: 20px 18px 18px; }
    .title { font-family: var(--serif); font-size: 23px; font-weight: 600; line-height: 1.25; margin: 0 0 6px;
      letter-spacing: .2px;
      display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .title-zh { font-size: 15.5px; font-weight: 600; line-height: 1.4; margin: 0 0 10px; color: rgba(255,255,255,.92);
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .meta { display: flex; align-items: center; gap: 8px; font-size: 12px; color: rgba(255,255,255,.8); }
    .meta .src { font-weight: 700; color: #fff; }
    .meta .dot { width: 3px; height: 3px; border-radius: 50%; background: rgba(255,255,255,.6); }

    .state { text-align: center; color: var(--muted); padding: 80px 20px; font-size: 14.5px; }
    .spinner { width: 26px; height: 26px; border: 2.5px solid #e6e6e6; border-top-color: var(--ink);
      border-radius: 50%; margin: 0 auto 16px; animation: spin .9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    footer { max-width: 560px; margin: 0 auto; text-align: center; color: var(--muted);
      font-size: 11px; padding: 6px 20px 40px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1 class="h-title">今日要闻</h1>
      <div class="h-sub" id="date">加载中…</div>
    </div>
    <button id="refresh">刷新</button>
  </header>

  <main id="list">
    <div class="state"><div class="spinner"></div>正在获取今日要闻…</div>
  </main>

  <footer>每日精选 5 条 · 国际 / 财经 / 科技 · BBC · The Guardian</footer>

  <script>
    const list = document.getElementById('list');
    const dateEl = document.getElementById('date');
    const CAT_LABEL = { politics: '国际', business: '财经', tech: '科技' };

    function fmtDate(iso) {
      const d = iso ? new Date(iso) : new Date();
      return d.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
    }
    function timeAgo(iso) {
      if (!iso) return '';
      const diff = (Date.now() - new Date(iso).getTime()) / 1000;
      if (diff < 3600) return Math.max(1, Math.floor(diff / 60)) + ' 分钟前';
      if (diff < 86400) return Math.floor(diff / 3600) + ' 小时前';
      return Math.floor(diff / 86400) + ' 天前';
    }
    function esc(s) { return String(s || '').replace(/"/g, '&quot;'); }

    function render(data) {
      dateEl.textContent = fmtDate(data.updatedAt);
      if (!data.items || !data.items.length) {
        list.innerHTML = '<div class="state">暂时没有获取到新闻，请稍后点“刷新”。</div>';
        return;
      }
      list.innerHTML = data.items.map((n) => `
        <a class="card" href="${esc(n.link)}" target="_blank" rel="noopener">
          ${n.image ? `<img class="photo" src="${esc(n.image)}" alt="" loading="lazy"
              onerror="this.style.display='none'">` : ''}
          <div class="shade"></div>
          <span class="cat">${CAT_LABEL[n.category] || '要闻'}</span>
          <div class="content">
            <h2 class="title">${n.title}</h2>
            ${n.titleZh ? `<div class="title-zh">${n.titleZh}</div>` : ''}
            <div class="meta">
              <span class="src">${n.source}</span>
              <span class="dot"></span>
              <span>${timeAgo(n.isoDate)}</span>
            </div>
          </div>
        </a>
      `).join('');
    }

    async function load() {
      list.innerHTML = '<div class="state"><div class="spinner"></div>正在获取今日要闻…</div>';
      try {
        const res = await fetch('/api/news', { cache: 'no-store' });
        if (!res.ok) throw new Error('接口错误');
        render(await res.json());
      } catch (e) {
        list.innerHTML = '<div class="state">😕 加载失败，请检查网络后点“刷新”重试。</div>';
      }
    }

    document.getElementById('refresh').addEventListener('click', load);
    load();

    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js'));
    }
  </script>
</body>
</html>
